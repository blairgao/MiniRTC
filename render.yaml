services:
  - type: web
    name: minirtc-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://bgtalk.onrender.com
      - key: FRONTEND_URL
        value: https://bgtalk.onrender.com

  - type: web
    name: bgaotalk
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bgtalk-api.onrender.com
